name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyara-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install yara-python-dex>=1.0.1
          pip install -e ".[dev,test,mcp]"

      - name: Compile YARA rules
        run: python prep-release.py

      - name: Run tests
        run: python -m pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check Python syntax
        run: |
          python -m py_compile apkid/ai_output.py
          python -m py_compile apkid/cli/app.py
          python -m py_compile apkid/cli/common.py
          python -m py_compile apkid/cli/cmd_scan.py
          python -m py_compile apkid/cli/cmd_batch.py
          python -m py_compile apkid/cli/cmd_diff.py
          python -m py_compile apkid/cli/cmd_type.py
          python -m py_compile apkid/cli/cmd_tags.py
          python -m py_compile apkid/cli/cmd_info.py
          python -m py_compile apkid/cli/cmd_rules.py
          python -m py_compile apkid/cli/cmd_skills.py
          python -m py_compile apkid/cli/__main__.py

      - name: Validate plugin JS
        run: node -e "const p = require('./.claude/plugins/ai-apkid.js'); console.log('Plugin OK:', p.name, p.skills.length, 'skills')"

      - name: Check SKILL.md frontmatter
        run: |
          for dir in .claude/skills/apkid-*/; do
            name=$(basename "$dir")
            file="${dir}SKILL.md"
            if [ ! -f "$file" ]; then echo "MISSING: $file"; exit 1; fi
            if ! grep -q "^name:" "$file"; then echo "NO name: in $file"; exit 1; fi
            if ! grep -q "^description:" "$file"; then echo "NO description: in $file"; exit 1; fi
            echo "OK: $name"
          done
